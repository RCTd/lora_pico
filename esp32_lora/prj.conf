CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_GPIO_ESP32=y

CONFIG_LORA=y

# OLED Disabled to free RAM for Wi-Fi
CONFIG_I2C=n
CONFIG_DISPLAY=n
CONFIG_CHARACTER_FRAMEBUFFER=n
CONFIG_SSD1306=n

CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y

CONFIG_SYS_HEAP_RUNTIME_STATS=y  
# Increase heap size for Wi-Fi driver (64KB)
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_THREAD_STACK_INFO=y  
CONFIG_THREAD_RUNTIME_STATS=y  
CONFIG_INIT_STACKS=y 

CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=n
CONFIG_NET_CONFIG_SETTINGS=n

CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_MAX_CONTEXTS=4

# Memory optimization for ESP32
CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_TX_STACK_SIZE=1024
CONFIG_NET_RX_STACK_SIZE=1024
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024

# Crypto needed for local LoRaWAN decryption
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_BASE64=y
